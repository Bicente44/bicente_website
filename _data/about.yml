aboutme: |
  I'm Vincent Welbourne, a Computer Engineering Technology - Computing Science student, I love to take on challenges and learn all sorts of unique things.

  I've studied areas ranging from data structures and operating systems to databases, while gaining experience with languages like Java, C and C++ alongside Web languages and database fundamentals. These have given me a strong foundation to tackle any problems make my own creations.

  I want to focus and learn how to create better things, my goal is to be free to create things that are actually meaningfull and impactfull to myself and those around me. Im a big believer in open source witch is why you'll find me posting almost any project of mine (those where im allowed to atleast) on GitHub. I will make and effort to keep my portfolio and and resume up to date and if you want to check that out make sure to click either the project or resume button on the top header!

  Thanks for reading please enjoy my website :)
